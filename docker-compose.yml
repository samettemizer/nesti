services:
  nesti-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: nesti-orchestrator:latest
    container_name: nesti-orchestrator
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount Docker socket so the orchestrator can spin up the sandbox container
      - /var/run/docker.sock:/var/run/docker.sock
      # Orchestrator creates /tmp/ai-dev-<id>-<rand>/repo inside this volume;
      # the path must be identical on host and container because the sandbox
      # is mounted by the HOST Docker daemon (via the socket above).
      - /tmp:/tmp
      # Optional: persist logs on the host
      - ./logs:/orchestrator/logs
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-60}
    command: ["--loop"]
    depends_on:
      nesti-redis:
        condition: service_healthy

  nesti-redis:
    image: redis:7-alpine
    container_name: nesti-redis
    restart: unless-stopped
    # AOF persistence: fsync every second → safe across stop/start, ~1s worst-case loss.
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - nesti_redis_data:/data
    ports:
      # Bind to localhost only – Redis is not exposed outside this host.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nesti-mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    image: nesti-mcp:latest
    container_name: nesti-mcp
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Same host-path contract as the orchestrator: gitlab_clone and
      # docker_run_tests operate on /tmp workspaces that the host Docker
      # daemon must be able to see when mounting the sandbox container.
      - /tmp:/tmp
    stdin_open: true
    tty: true
    depends_on:
      nesti-redis:
        condition: service_healthy

volumes:
  # Survives `docker-compose stop` and `docker-compose down`.
  # Removed only by `docker-compose down -v`.
  nesti_redis_data:
    driver: local
